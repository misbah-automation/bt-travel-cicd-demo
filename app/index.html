<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>BT Travel Login Demo</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="page-container">
    <section
      class="login-card"
      data-testid="login-card"
    >
      <div class="brand-section">
        <h1 data-testid="login-heading">
          BT Travel
        </h1>

        <p>
          Sign in to continue to your account
        </p>
      </div>

      <form
        id="login-form"
        data-testid="login-form"
        novalidate
      >
        <div class="form-group">
          <label for="email">
            Email address
          </label>

          <input
            id="email"
            name="email"
            type="email"
            placeholder="Enter your email"
            autocomplete="email"
            data-testid="email-input"
          >

          <p
            id="email-error"
            class="error-message"
            data-testid="email-error"
          ></p>
        </div>

        <div class="form-group">
          <label for="password">
            Password
          </label>

          <input
            id="password"
            name="password"
            type="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            data-testid="password-input"
          >

          <p
            id="password-error"
            class="error-message"
            data-testid="password-error"
          ></p>
        </div>

        <p
          id="login-error"
          class="error-message login-error"
          data-testid="login-error"
        ></p>

        <button
          id="login-button"
          type="submit"
          data-testid="login-button"
        >
          Sign In
        </button>
      </form>

      <div class="demo-credentials">
        <p>
          <strong>Demo account</strong>
        </p>

        <p>Email: qa@bttravel.demo</p>
        <p>Password: Test@123</p>
      </div>
    </section>

    <section
      id="dashboard"
      class="dashboard-card hidden"
      data-testid="dashboard"
    >
      <h2 data-testid="dashboard-heading">
        Welcome to BT Travel
      </h2>

      <p data-testid="login-success-message">
        You have logged in successfully.
      </p>

      <button
        id="logout-button"
        type="button"
        data-testid="logout-button"
      >
        Log Out
      </button>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
